<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gig Photography — Will Hynes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap"
      rel="stylesheet"
    />
    <script src="js/main.js"></script>
    <script src="js/lightbox.js"></script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --coral: #d85a30;
        --coral-light: #f0997b;
        --purple: #7f77dd;
        --off-black: #0e0e0e;
        --off-white: #f5f2ed;
        --mid: #888780;
        --font-display: "Bebas Neue", sans-serif;
        --font-body: "DM Sans", sans-serif;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        background: var(--off-black);
        color: var(--off-white);
        font-family: var(--font-body);
        font-weight: 300;
        line-height: 1.6;
        overflow-x: hidden;
      }

      /* ── NAV ── */
      nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1.25rem 2.5rem;
        border-bottom: 0.5px solid rgba(255, 255, 255, 0.08);
        background: rgba(14, 14, 14, 0.9);
        backdrop-filter: blur(12px);
      }
      .nav-logo {
        font-family: var(--font-display);
        font-size: 22px;
        letter-spacing: 0.04em;
        color: var(--off-white);
        text-decoration: none;
      }
      .nav-logo span {
        color: var(--coral);
      }
      .nav-back {
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--mid);
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 6px;
        transition: color 0.2s;
      }
      .nav-back:hover {
        color: var(--off-white);
      }

      /* ── PAGE HEADER ── */
      .page-header {
        padding: 7rem 2.5rem 3rem;
        border-bottom: 0.5px solid rgba(255, 255, 255, 0.08);
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 1rem;
      }
      .page-header h1 {
        font-family: var(--font-display);
        font-size: clamp(42px, 7vw, 80px);
        letter-spacing: 0.03em;
        line-height: 1;
      }
      .page-header h1 span {
        color: var(--coral);
      }
      .page-header p {
        font-size: 14px;
        color: var(--mid);
        max-width: 300px;
        text-align: right;
        line-height: 1.6;
      }

      /* ── FILTER BAR ── */
      .filter-bar {
        padding: 1.25rem 2.5rem;
        border-bottom: 0.5px solid rgba(255, 255, 255, 0.08);
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
        position: sticky;
        top: 64px;
        z-index: 50;
        background: rgba(14, 14, 14, 0.95);
        backdrop-filter: blur(8px);
      }
      .filter-label {
        font-size: 11px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--mid);
        margin-right: 4px;
      }
      .filter-btn {
        font-family: var(--font-body);
        font-size: 12px;
        letter-spacing: 0.04em;
        padding: 5px 14px;
        background: transparent;
        border: 0.5px solid rgba(255, 255, 255, 0.12);
        border-radius: 999px;
        color: var(--mid);
        cursor: pointer;
        transition:
          border-color 0.15s,
          color 0.15s,
          background 0.15s;
        white-space: nowrap;
      }
      .filter-btn:hover {
        border-color: rgba(255, 255, 255, 0.3);
        color: var(--off-white);
      }
      .filter-btn.active {
        background: var(--coral);
        border-color: var(--coral);
        color: #fff;
      }

      /* ── BAND SECTIONS ── */
      .band-section {
        padding: 2rem 1.5rem; /* Reduced padding */
        border-bottom: 0.5px solid rgba(255, 255, 255, 0.08);
      }
      .band-header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        margin-bottom: 1rem; /* Tighter spacing */
        flex-wrap: wrap;
        gap: 0.5rem;
      }
      .band-name {
        font-family: var(--font-display);
        font-size: 32px;
        letter-spacing: 0.04em;
        line-height: 1;
      }
      .band-meta {
        font-size: 11px;
        color: var(--mid);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .band-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 8px; /* Tighter gap */
        max-width: 1600px;
      }
      .band-grid::after {
        content: "";
        flex-grow: 99999;
      }
      
      /* photo slot */
      .photo-slot {
        height: 380px; /* Slightly taller base */
        position: relative;
        cursor: pointer;
        border-radius: 4px;
        overflow: hidden;
        flex: 1 1 auto;
      }
      /* Portrait 2:3 ratio */
      .photo-slot.portrait {
        flex-basis: 253px; 
      }
      /* Landscape 3:2 ratio */
      .photo-slot.landscape {
        flex-basis: 570px;
      }

      .photo-slot img {
        width: 100%;
        height: 100%;
        object-fit: contain; 
        background: #0a0a0a; 
        display: block;
      }

      .band-grid.wide .photo-slot {
        height: 500px;
      }
      .band-grid.wide .photo-slot.portrait {
        flex-basis: 333px;
      }
      .band-grid.wide .photo-slot.landscape {
        flex-basis: 750px;
      }

      /* Responsive adjustments */
      @media (max-width: 1100px) {
        .photo-slot { height: 300px; }
        .photo-slot.portrait { flex-basis: 200px; }
        .photo-slot.landscape { flex-basis: 450px; }
        .band-grid.wide .photo-slot { height: 380px; }
        .band-grid.wide .photo-slot.portrait { flex-basis: 253px; }
        .band-grid.wide .photo-slot.landscape { flex-basis: 570px; }
      }

      @media (max-width: 650px) {
        .band-grid::after { display: none; } /* Allow photos to fill the full width on mobile */
        .band-section { padding: 1.5rem 1rem; }
        .photo-slot, .band-grid.wide .photo-slot { height: 320px; } /* Larger height on mobile */
        .photo-slot.portrait { flex-basis: 213px; }
        .photo-slot.landscape { flex-basis: 480px; }
      }

      @media (max-width: 480px) {
        /* Single column stack for small phones */
        .photo-slot, .band-grid.wide .photo-slot { 
          height: auto; 
          flex-basis: 100%;
        }
        .photo-slot.portrait { aspect-ratio: 2/3; }
        .photo-slot.landscape { aspect-ratio: 3/2; }
      }

      @media (max-width: 600px) {
        .page-header {
          padding: 6rem 1.25rem 2rem;
        }
        .filter-bar {
          padding: 1rem 1.25rem;
          top: 60px;
        }
        nav {
          padding: 1rem 1.25rem;
        }
        footer {
          padding: 1.25rem;
        }
      }

      /* ── FOOTER ── */
      footer {
        padding: 1.5rem 2.5rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.18);
        letter-spacing: 0.05em;
        flex-wrap: wrap;
        gap: 0.5rem;
      }

      /* ── FADE IN ── */
      .fade-up {
        opacity: 0;
        transform: translateY(20px);
        transition:
          opacity 0.6s ease,
          transform 0.6s ease;
      }
      .fade-up.visible {
        opacity: 1;
        transform: translateY(0);
      }
    </style>
  </head>
  <body>
    <nav>
      <a href="index.html" class="nav-logo"
        >Will Hynes <span>Photography</span></a
      >
      <a href="index.html" class="nav-back">← Back to portfolio</a>
    </nav>

    <div class="page-header">
      <h1>Gig<br /><span>Photography</span></h1>
      <p>
        All bands, all venues.
      </p>
    </div>

    <!-- FILTER BAR -->
    <div class="filter-bar" id="filter-bar">
      <!-- Dynamically populated -->
    </div>

    <div id="gallery-content"></div>

    <footer>
      <span>© 2026 Will Hynes Photography</span>
      <a
        href="index.html"
        style="color: rgba(255, 255, 255, 0.18); text-decoration: none"
        >← Back to portfolio</a
      >
    </footer>

    <script>
      async function initGallery() {
        const data = await portfolio.fetchSiteData();
        if (!data) return;

        const container = document.getElementById("gallery-content");
        const filterBar = document.getElementById("filter-bar");

        // 1. Build Filter Bar
        let filterHtml = `<span class="filter-label">Filter</span>`;
        filterHtml += `<button class="filter-btn active" data-filter="all">All</button>`;
        data.bands.forEach(band => {
          filterHtml += `<button class="filter-btn" data-filter="${band.id}">${band.name}</button>`;
        });
        filterBar.innerHTML = filterHtml;

        // 2. Build band sections
        data.bands.forEach((band) => {
          const section = document.createElement("div");
          section.className = "band-section fade-up";
          section.dataset.band = band.id;

          section.innerHTML = `
            <div class="band-header">
              <div class="band-name">${band.name}</div>
              <div class="band-meta">${band.meta}</div>
            </div>
            <div class="band-grid ${band.isWide ? "wide" : ""}">
              ${band.photos
                .map(
                  (photo, index) => `
                <div class="photo-slot ${photo.orientation} ${
                  band.colorClass || ""
                }" onclick="openBandLightbox('${band.id}', ${index})">
                  ${
                    photo.src
                      ? `<img src="${photo.src}" alt="${band.name} live">`
                      : `
                    <div class="photo-slot-inner">
                      <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
                        <circle cx="16" cy="16" r="6" stroke="white" stroke-width="1.2" />
                        <path d="M12 4h8l2 3h4a2 2 0 012 2v16a2 2 0 01-2 2H6a2 2 0 01-2-2V9a2 2 0 012-2h4l2-3z" stroke="white" stroke-width="1.2" fill="none" />
                      </svg>
                      <span>your photo</span>
                    </div>
                  `
                  }
                  <div class="photo-hover">
                    <div class="photo-hover-title">${band.name}</div>
                    <div class="photo-hover-sub">${band.venue || "Live"}</div>
                  </div>
                </div>
              `,
                )
                .join("")}
            </div>
          `;
          container.appendChild(section);
        });

        // Global function for lightbox triggers
        window.openBandLightbox = (bandId, photoIndex) => {
          const band = data.bands.find((b) => b.id === bandId);
          if (!band) return;
          const group = band.photos
            .filter((p) => p.src)
            .map((p) => ({
              src: p.src,
              title: `${band.name} · ${band.venue || "Live"}`,
            }));
          const clickedPhoto = band.photos[photoIndex];
          if (!clickedPhoto || !clickedPhoto.src) return;

          const actualIndex = group.findIndex((p) => p.src === clickedPhoto.src);
          if (actualIndex !== -1) Lightbox.show(actualIndex, group);
        };

        // Re-init fade observer
        portfolio.initFadeObserver();

        // Re-init filtering logic for dynamic buttons
        const btns = filterBar.querySelectorAll(".filter-btn");
        const sections = document.querySelectorAll(".band-section");

        btns.forEach((btn) => {
          btn.addEventListener("click", () => {
            btns.forEach((b) => b.classList.remove("active"));
            btn.classList.add("active");
            const filter = btn.dataset.filter;
            sections.forEach((s) => {
              if (filter === "all" || s.dataset.band === filter) {
                s.style.display = "";
              } else {
                s.style.display = "none";
              }
            });
          });
        });
      }

      initGallery();
    </script>
